name: Production Guard

on:
  push:
    branches:
      - codex/r4-10a-governance-and-promotion-guard
  pull_request:
    branches:
      - main

jobs:
  production-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run production promotion guard
        run: |
          python scripts/run_source_registry_audit.py --root .
          python scripts/run_production_promotion_guard.py --root .
          python scripts/run_production_status_gate.py --root .
