name: HigherGov fetch

on:
  workflow_dispatch:

jobs:
  fetch_highergov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch HigherGov exports
        env:
          HIGHERGOV_API_KEY: ${{ secrets.HIGHERGOV_API_KEY }}
        run: |
          echo "Starting HigherGov fetch..."
          python3 scripts/fetch_highergov_api.py

      - name: Upload HigherGov exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: highergov-exports
          path: data/staging/expansion
